services:
  sonosloxonebridge:
    build: .
    image: ghcr.io/bausi2k/sonosloxonebridge:latest
    container_name: sonosloxonebridge
    restart: unless-stopped
    # Use host networking mode to allow UPnP/SSDP Sonos auto-discovery on the LAN
    network_mode: host
    volumes:
      # Map the local config folder for persistent JSON settings
      - ./config:/app/config
      # Map the presets folder to persist custom presets created in the UI
      - ./presets:/app/presets
      # Map the clips folder for custom notification audio files
      - ./clips:/app/public/clips
    environment:
      - NODE_ENV=production
      # Port für den internen Sonos-UPnP-Event-Listener. Ändern, falls 6329 auf dem NAS bereits belegt ist.
      - SONOS_LISTENER_PORT=6330
